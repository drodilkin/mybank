<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROFIT BANK • TERMINAL • ASSETS</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&family=Unbounded:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* ====== GLOBAL DESIGN SYSTEM ====== */
        :root {
            --accent-primary: #ffd600;
            --accent-soft: rgba(255, 214, 0, 0.15);
            --bg-main: #050508;
            --bg-surface: #0f0f13;
            --bg-card: linear-gradient(145deg, #12121a 0%, #050508 100%);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-white: #ffffff;
            --text-gray: #88888a;
            --text-dark: #333336;
            --status-error: #ff3366;
            --status-success: #00ffaa;
            --glass-effect: rgba(255, 255, 255, 0.03);
            --blur-radius: 30px;
            
            --font-header-stack: 'Unbounded', sans-serif;
            --font-main-stack: 'Manrope', sans-serif;
            
            --transition-fast: 0.2s;
            --transition-mid: 0.4s;
            --transition-slow: 0.8s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; background-color: var(--bg-main); color: var(--text-white); font-family: var(--font-main-stack); overflow: hidden; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }

        @keyframes viewSlideIn { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes nfcPulseMain { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 214, 0, 0.3); } 50% { transform: scale(1.08); box-shadow: 0 0 0 25px rgba(255, 214, 0, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 214, 0, 0); } }
        @keyframes blinkWarning { 0% { border-color: var(--status-error); opacity: 1; } 50% { border-color: var(--status-error); opacity: 0.5; background: rgba(255, 51, 102, 0.1); } 100% { border-color: var(--status-error); opacity: 1; } }
        @keyframes assetGlow { 0% { border-color: var(--accent-primary); box-shadow: 0 0 0 0 rgba(255,214,0,0.1); } 50% { border-color: var(--status-success); box-shadow: 0 0 20px rgba(0,255,170,0.2); } 100% { border-color: var(--accent-primary); box-shadow: 0 0 0 0 rgba(255,214,0,0.1); } }

        /* Аутентификация */
        #view-authentication {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 99999;
            background-color: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            transition: all var(--transition-slow) cubic-bezier(0.8, 0, 0.2, 1);
            visibility: visible;
            opacity: 1;
        }
        #view-authentication.system-hidden { transform: translateY(-100%); opacity: 0; visibility: hidden; }
        .auth-container-box { width: 100%; max-width: 440px; text-align: center; }
        .brand-identity-logo { font-family: var(--font-header-stack); font-size: 48px; font-weight: 900; color: var(--accent-primary); text-transform: uppercase; margin-bottom: 20px; letter-spacing: 6px; }
        .brand-subtext { font-family: var(--font-header-stack); font-size: 10px; color: var(--text-gray); margin-bottom: 60px; text-transform: uppercase; letter-spacing: 2px; }

        .system-input-wrapper { margin-bottom: 30px; text-align: left; }
        .system-input-label { display: block; font-size: 10px; font-family: var(--font-header-stack); color: var(--text-gray); margin-left: 20px; margin-bottom: 12px; text-transform: uppercase; font-weight: 600; }
        .terminal-field { width: 100%; padding: 22px 28px; background: #000000; border: 1px solid #1a1a1a; border-radius: 26px; color: #ffffff; font-size: 16px; font-family: var(--font-main-stack); font-weight: 500; transition: border-color 0.3s ease, box-shadow 0.3s ease; }
        .terminal-field:focus { border-color: var(--accent-primary); box-shadow: 0 0 25px var(--accent-soft); }
        .terminal-field.warning { animation: blinkWarning 1.5s infinite; border-color: var(--status-error); }
        .terminal-select { appearance: none; cursor: pointer; }

        .btn-action-primary { width: 100%; padding: 24px; background-color: var(--accent-primary); border: none; border-radius: 26px; font-family: var(--font-header-stack); font-weight: 800; font-size: 13px; color: #000000; text-transform: uppercase; cursor: pointer; transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 10px 30px rgba(255, 214, 0, 0.1); }
        .btn-action-primary:active { transform: scale(0.96); }
        .btn-action-secondary { width: 100%; padding: 20px; background: transparent; border: 1px solid var(--border-color); border-radius: 22px; color: var(--text-white); font-family: var(--font-header-stack); font-size: 10px; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease; }
        .btn-action-secondary:hover { border-color: var(--text-gray); background: var(--glass-effect); }

        /* Основной лэйаут */
        .main-scaffold { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; padding-bottom: 150px; }

        /* Хедер с балансом */
        .header-asset-card {
            background: var(--bg-card);
            padding: 55px 40px;
            border-radius: 48px;
            border: 1px solid var(--border-color);
            margin-bottom: 45px;
            position: relative;
            display: none;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }
        body.state-header-active .header-asset-card { display: block; animation: viewSlideIn 0.5s ease; }
        .asset-label { font-family: var(--font-header-stack); font-size: 10px; color: var(--text-gray); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        .asset-balance-value { font-family: var(--font-header-stack); font-size: 48px; font-weight: 800; display: flex; align-items: baseline; margin-bottom: 10px; }
        .asset-balance-value span { color: var(--accent-primary); font-size: 24px; margin-left: 12px; }
        .asset-balance-nfc { font-family: var(--font-header-stack); font-size: 24px; font-weight: 600; display: flex; align-items: baseline; color: var(--status-success); }
        .asset-balance-nfc span { color: var(--status-success); font-size: 16px; margin-left: 8px; }
        .asset-card-number { margin-top: 25px; font-family: var(--font-header-stack); font-size: 12px; color: var(--accent-primary); opacity: 0.4; letter-spacing: 3px; }
        .card-status-badge { position: absolute; top: 20px; right: 20px; padding: 8px 16px; border-radius: 30px; font-family: var(--font-header-stack); font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .card-status-active { background: var(--status-success); color: #000; }
        .card-status-blocked { background: var(--status-error); color: #fff; }

        /* Индикатор блокировки аккаунта */
        .account-blocked-banner {
            background: var(--status-error);
            color: #fff;
            text-align: center;
            padding: 15px;
            border-radius: 30px;
            margin-bottom: 20px;
            font-family: var(--font-header-stack);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: none;
        }
        .account-blocked-banner.show { display: block; }

        .content-section { display: none; }
        .content-section.is-active { display: block; animation: viewSlideIn 0.6s cubic-bezier(0.23, 1, 0.32, 1); }

        /* Транзакции */
        .ledger-container { display: flex; flex-direction: column; gap: 18px; }
        .ledger-row { background: var(--glass-effect); padding: 26px; border-radius: 32px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); transition: transform 0.3s ease; }
        .ledger-row:active { transform: scale(0.98); }
        .ledger-meta { display: flex; flex-direction: column; gap: 6px; }
        .ledger-user { font-weight: 800; font-size: 16px; color: var(--text-white); }
        .ledger-note { font-size: 12px; color: var(--text-gray); }
        .ledger-amount { font-family: var(--font-header-stack); font-weight: 700; font-size: 16px; }
        .amount-pos { color: var(--status-success); }
        .amount-neg { color: var(--status-error); }

        /* АКТИВЫ (БИЗНЕС, КВАРТИРЫ, ТРАТЫ) */
        .assets-grid {
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-top: 25px;
        }
        .asset-category {
            background: var(--glass-effect);
            border-radius: 42px;
            padding: 30px 28px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
        }
        .asset-category:hover {
            border-color: var(--accent-primary);
            background: rgba(255, 214, 0, 0.03);
        }
        .asset-category-header {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 30px;
            font-family: var(--font-header-stack);
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-primary);
            border-left: 5px solid var(--accent-primary);
            padding-left: 20px;
        }
        .asset-category-header span {
            font-size: 32px;
        }
        .asset-items {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .asset-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 38px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.25s ease;
        }
        .asset-item:hover {
            border-color: var(--status-success);
            transform: scale(1.01);
        }
        .asset-info {
            flex: 2;
        }
        .asset-name {
            font-weight: 800;
            font-size: 18px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .asset-name .asset-icon {
            font-size: 28px;
        }
        .asset-price {
            font-family: var(--font-header-stack);
            font-size: 14px;
            color: var(--text-gray);
            letter-spacing: 1px;
        }
        .asset-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .asset-actions .owned-badge {
            background: rgba(0, 255, 170, 0.15);
            padding: 8px 18px;
            border-radius: 60px;
            font-size: 12px;
            font-weight: 700;
            color: var(--status-success);
            font-family: var(--font-header-stack);
        }
        .btn-buy-asset {
            background: linear-gradient(135deg, #ffd60020 0%, #ffd60005 100%);
            border: 1px solid var(--accent-primary);
            padding: 12px 28px;
            border-radius: 40px;
            font-family: var(--font-header-stack);
            font-weight: 700;
            font-size: 12px;
            color: var(--accent-primary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-buy-asset:active {
            transform: scale(0.94);
            background: var(--accent-primary);
            color: #000;
        }
        .total-assets-value {
            text-align: right;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid var(--border-color);
            font-family: var(--font-header-stack);
            font-size: 20px;
            font-weight: 800;
        }
        .total-assets-value span {
            color: var(--status-success);
            font-size: 28px;
        }

        /* NFC секция */
        .nfc-terminal-hub { text-align: center; padding: 20px 0; }
        .nfc-scanner-circle { width: 160px; height: 160px; border: 4px solid var(--accent-primary); border-radius: 50%; margin: 0 auto 40px; display: flex; align-items: center; justify-content: center; animation: nfcPulseMain 2.5s infinite ease-in-out; background: radial-gradient(circle, var(--accent-soft) 0%, transparent 70%); cursor: pointer; transition: all 0.3s ease; }
        .nfc-scanner-circle span { font-family: var(--font-header-stack); font-size: 26px; font-weight: 900; color: var(--accent-primary); }
        .nfc-grid-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 35px; }
        .nfc-grid-3col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 20px; }
        .nfc-billing-zone { margin-top: 40px; padding-top: 40px; border-top: 1px solid var(--border-color); }
        .nfc-card-info { background: var(--glass-effect); border-radius: 32px; padding: 25px; margin-top: 25px; border: 1px solid rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); }
        .nfc-card-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--border-color); }
        .nfc-card-row:last-child { border-bottom: none; }
        .nfc-card-label { color: var(--text-gray); font-size: 12px; }
        .nfc-card-value { font-family: var(--font-header-stack); font-weight: 700; font-size: 14px; }
        .nfc-card-value.warning { color: var(--status-error); }
        .nfc-card-value.success { color: var(--status-success); }

        /* Админка */
        .admin-section { margin-bottom: 40px; }
        .admin-subtitle { font-family: var(--font-header-stack); font-size: 14px; color: var(--accent-primary); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; border-left: 4px solid var(--accent-primary); padding-left: 20px; }
        .admin-grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .admin-card { background: var(--glass-effect); border-radius: 32px; padding: 30px; border: 1px solid var(--border-color); backdrop-filter: blur(10px); }
        .admin-checkbox { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
        .admin-list { margin-top: 30px; }
        .admin-list-item { background: rgba(0,0,0,0.3); border-radius: 22px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border-color); }
        .admin-list-item .info { flex: 1; }
        .admin-list-item .title { font-weight: 700; font-size: 16px; margin-bottom: 5px; }
        .admin-list-item .meta { font-size: 12px; color: var(--text-gray); }
        .admin-list-item .delete-btn { background: transparent; border: 1px solid var(--status-error); color: var(--status-error); padding: 10px 15px; border-radius: 20px; font-size: 11px; cursor: pointer; transition: all 0.3s ease; }
        .admin-list-item .delete-btn:hover { background: var(--status-error); color: #000; }
        .admin-image-preview { max-width: 100px; max-height: 100px; border-radius: 12px; margin-top: 10px; border: 1px solid var(--border-color); }

        /* Реклама */
        .ads-carousel { margin-bottom: 35px; overflow-x: auto; display: flex; gap: 20px; padding: 5px 0 20px 0; scrollbar-width: thin; scrollbar-color: var(--accent-primary) var(--bg-surface); }
        .ads-carousel::-webkit-scrollbar { height: 5px; }
        .ads-carousel::-webkit-scrollbar-track { background: var(--bg-surface); border-radius: 10px; }
        .ads-carousel::-webkit-scrollbar-thumb { background: var(--accent-primary); border-radius: 10px; }
        .ad-card { flex: 0 0 280px; background: var(--glass-effect); border-radius: 32px; padding: 25px; border: 1px solid var(--border-color); backdrop-filter: blur(10px); transition: transform 0.3s ease; cursor: pointer; display: flex; gap: 15px; align-items: center; }
        .ad-card .ad-image-left { width: 80px; height: 80px; border-radius: 16px; object-fit: cover; }
        .ad-card .ad-image-top { width: 100%; height: 120px; border-radius: 16px; object-fit: cover; margin-bottom: 10px; }
        .ad-card .ad-image-right { width: 80px; height: 80px; border-radius: 16px; object-fit: cover; order: 2; }
        .ad-card .ad-image-bottom { width: 100%; height: 120px; border-radius: 16px; object-fit: cover; margin-top: 10px; order: 2; }
        .ad-card .ad-image-background { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.2; border-radius: 32px; z-index: 0; pointer-events: none; }
        .ad-card .content { flex: 1; position: relative; z-index: 1; }
        .ad-card.position-background { position: relative; overflow: hidden; }
        .ad-card .ad-title { font-family: var(--font-header-stack); font-size: 16px; font-weight: 700; margin-bottom: 10px; color: var(--accent-primary); }
        .ad-card .ad-description { font-size: 13px; color: var(--text-gray); margin-bottom: 15px; line-height: 1.5; }
        .ad-card .ad-link { font-size: 11px; color: var(--status-success); text-transform: uppercase; letter-spacing: 1px; }

        /* Нижняя навигация */
        .bottom-nav-dock {
            position: fixed;
            bottom: 35px;
            left: 25px;
            right: 25px;
            background: rgba(15, 15, 19, 0.9);
            backdrop-filter: blur(var(--blur-radius));
            border-radius: 45px;
            display: flex;
            padding: 12px;
            border: 1px solid var(--border-color);
            z-index: 10000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        .nav-dock-item {
            flex: 1;
            padding: 18px 5px;
            border: none;
            background: transparent;
            color: var(--text-gray);
            font-family: var(--font-header-stack);
            font-size: 9px;
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
            cursor: pointer;
            transition: color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 1px;
        }
        .nav-dock-item.is-active { color: var(--accent-primary); }
        .nav-dock-item.operator-only { display: none; }
        body.operator-mode .nav-dock-item.operator-only { display: block; }

        /* Уведомления */
        #global-toast-notification {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--accent-primary);
            color: #000000;
            padding: 24px 50px;
            border-radius: 60px;
            font-family: var(--font-header-stack);
            font-weight: 900;
            font-size: 11px;
            text-transform: uppercase;
            z-index: 999999;
            transition: all 0.7s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .tax-modal, .thanks-modal, .blocked-modal, .page-blocker { display: none; }
        .tax-modal.show, .thanks-modal.show, .blocked-modal.show, .page-blocker.active { display: flex; }
        /* модалки стили минимально, они уже есть в коде */
    </style>
</head>
<body>

    <div id="global-toast-notification">KERNEL v20 · ASSETS ACTIVE</div>
    <div class="page-blocker" id="page-blocker"><div class="blocker-content">...</div></div>
    <div class="blocked-modal" id="blocked-modal"><div class="blocked-modal-content">...</div></div>
    <div class="tax-modal" id="tax-modal"><div class="tax-modal-content">...</div></div>
    <div class="thanks-modal" id="thanks-modal"><div class="thanks-modal-content">...</div></div>

    <section id="view-authentication">
        <div class="auth-container-box">
            <span class="brand-identity-logo">PROFIT</span>
            <p class="brand-subtext">Secure Gateway v12.0</p>
            <div class="system-input-wrapper"><label class="system-input-label">Terminal Identity (Email)</label><input type="email" id="input-auth-email" class="terminal-field" placeholder="operator@profit.sys"></div>
            <div class="system-input-wrapper"><label class="system-input-label">Access Pass-Code</label><input type="password" id="input-auth-pass" class="terminal-field" placeholder="••••••••"></div>
            <button class="btn-action-primary" onclick="CoreEngine.requestAccess()">Initialize Session</button>
            <p style="margin-top: 30px; font-size: 10px; color: var(--text-dark);">© 2026 PROFIT SYSTEMS CORP.</p>
        </div>
    </section>

    <main class="main-scaffold">
        <div class="header-asset-card" id="global-header-card">
            <div class="asset-label">Verified Liquidity</div>
            <div class="asset-balance-value" id="display-balance">0<span>₽</span></div>
            <div class="asset-balance-nfc" id="display-nfc-balance">0<span>₽</span></div>
            <div class="asset-card-number" id="display-card-id">9771 0000 0000 0000</div>
            <div class="card-status-badge card-status-active" id="card-status-badge">АКТИВНА</div>
        </div>
        <div class="account-blocked-banner" id="account-blocked-banner">⚠️ ВАШ АККАУНТ ЗАБЛОКИРОВАН: <span id="blocked-banner-message"></span></div>

        <!-- Вкладка Кошелёк -->
        <div id="sect-wallet" class="content-section is-active">
            <div class="ads-carousel" id="ads-carousel"></div>
            <h2 style="font-family: var(--font-header-stack); font-size: 11px; color: var(--accent-primary); margin-bottom: 35px;">Operational Ledger</h2>
            <div class="ledger-container" id="ledger-feed-root"></div>
        </div>

        <!-- Вкладка АКТИВЫ (ТРАТЫ) -->
        <div id="sect-assets" class="content-section">
            <h2 style="font-family: var(--font-header-stack); font-size: 11px; color: var(--accent-primary); margin-bottom: 25px;">💰 ИМУЩЕСТВО & ИНВЕСТИЦИИ</h2>
            <div class="assets-grid" id="assets-container"></div>
            <div style="margin-top: 35px;">
                <div class="system-input-wrapper"><label class="system-input-label">🔥 ИНДИВИДУАЛЬНАЯ ТРАТА (RUB)</label><input type="number" id="custom-spend-amount" class="terminal-field" placeholder="Сумма до 1 000 000 000 ₽" min="1" max="1000000000"></div>
                <div class="system-input-wrapper"><label class="system-input-label">НАЗНАЧЕНИЕ (что купили?)</label><input type="text" id="custom-spend-label" class="terminal-field" placeholder="Частный самолет, яхта, остров..."></div>
                <button class="btn-action-primary" onclick="AssetsManager.spendCustom()">💸 ПОТРАТИТЬ</button>
            </div>
        </div>

        <!-- Вкладка Перевод -->
        <div id="sect-send" class="content-section">...</div>
        <div id="sect-nfc" class="content-section">...</div>
        <div id="sect-admin" class="content-section">...</div>
        <div id="sect-settings" class="content-section">...</div>
    </main>

    <nav class="bottom-nav-dock">
        <button class="nav-dock-item is-active" onclick="CoreEngine.switchView('wallet', this)">ТРАНЗАКЦИИ</button>
        <button class="nav-dock-item" onclick="CoreEngine.switchView('send', this)">ПЕРЕВОД</button>
        <button class="nav-dock-item" onclick="CoreEngine.switchView('nfc', this)">NFC</button>
        <button class="nav-dock-item" onclick="CoreEngine.switchView('assets', this)">АКТИВЫ</button>
        <button class="nav-dock-item operator-only" onclick="CoreEngine.switchView('admin', this)">АДМИН</button>
        <button class="nav-dock-item" onclick="CoreEngine.switchView('settings', this)">ИНФО</button>
    </nav>

    <script>
        // ========== ASSETS MANAGER (траты до 1 млрд) ==========
        const AssetsManager = {
            catalogue: [
                { id: 'apt_1', name: 'Пентхаус в Москва-Сити', price: 450000000, icon: '🏢', category: 'Недвижимость', desc: 'Вид на всю Москву' },
                { id: 'apt_2', name: 'Особняк на Рублёвке', price: 780000000, icon: '🏛️', category: 'Недвижимость', desc: '6 000 м² + вертолётная площадка' },
                { id: 'apt_3', name: 'Вилла на Мальдивах', price: 950000000, icon: '🏝️', category: 'Недвижимость', desc: 'Собственный пляж' },
                { id: 'biz_1', name: 'Торговый центр "Гранд"', price: 890000000, icon: '🏬', category: 'Бизнес', desc: 'Арендный поток 15 млн/мес' },
                { id: 'biz_2', name: 'Сеть АЗС (10 станций)', price: 520000000, icon: '⛽', category: 'Бизнес', desc: 'Стабильный доход' },
                { id: 'biz_3', name: 'IT-стартап AI Hub', price: 240000000, icon: '🤖', category: 'Бизнес', desc: 'Доля 49%' },
                { id: 'car_1', name: 'Bugatti La Voiture Noire', price: 850000000, icon: '🏎️', category: 'Авто', desc: 'Эксклюзив' },
                { id: 'car_2', name: 'Rolls-Royce Boat Tail', price: 990000000, icon: '🚘', category: 'Авто', desc: 'С чемоданом для шампанского' },
                { id: 'yacht_1', name: 'Мегаяхта "Eclipse 2.0"', price: 1000000000, icon: '🛥️', category: 'Яхты', desc: '120 метров, вертолёт' },
                { id: 'jet_1', name: 'Boeing Business Jet', price: 940000000, icon: '✈️', category: 'Авиация', desc: 'VIP-салон' },
                { id: 'art_1', name: 'Картина Бэнкси (оригинал)', price: 64000000, icon: '🎨', category: 'Искусство', desc: 'Мета-инвестиция' }
            ],
            owned: [],

            render() {
                const container = document.getElementById('assets-container');
                if (!container) return;
                const categories = [...new Map(this.catalogue.map(item => [item.category, item.category]))];
                let html = '';
                categories.forEach(cat => {
                    const itemsInCat = this.catalogue.filter(i => i.category === cat);
                    html += `<div class="asset-category">
                        <div class="asset-category-header"><span>${cat === 'Недвижимость' ? '🏠' : cat === 'Бизнес' ? '📈' : cat === 'Авто' ? '🚗' : cat === 'Яхты' ? '⛵' : cat === 'Авиация' ? '🛩️' : '🎭'}</span> ${cat}</div>
                        <div class="asset-items">`;
                    itemsInCat.forEach(item => {
                        const isOwned = this.owned.some(o => o.id === item.id);
                        html += `<div class="asset-item">
                            <div class="asset-info">
                                <div class="asset-name"><span class="asset-icon">${item.icon}</span> ${item.name}</div>
                                <div class="asset-price">₽ ${item.price.toLocaleString('ru-RU')}</div>
                                <div style="font-size: 10px; color:#555;">${item.desc}</div>
                            </div>
                            <div class="asset-actions">
                                ${isOwned ? '<span class="owned-badge">✅ ВЛАДЕЮ</span>' : `<button class="btn-buy-asset" onclick="AssetsManager.buyAsset('${item.id}')">КУПИТЬ</button>`}
                            </div>
                        </div>`;
                    });
                    html += `</div></div>`;
                });
                container.innerHTML = html;
                this.updateTotalValue();
            },

            async buyAsset(assetId) {
                if (CoreEngine.checkBlockedBeforeAction?.()) return;
                const asset = this.catalogue.find(a => a.id === assetId);
                if (!asset) return;
                if (this.owned.some(o => o.id === assetId)) return CoreEngine.pushNotification("У вас уже есть этот актив", true);
                if (CoreEngine.session.userBalance < asset.price) return CoreEngine.pushNotification(`Недостаточно средств. Нужно ${asset.price.toLocaleString('ru-RU')} ₽`, true);
                
                const confirmPurchase = confirm(`Купить ${asset.name} за ${asset.price.toLocaleString('ru-RU')} ₽?`);
                if (!confirmPurchase) return;
                
                try {
                    const response = await fetch(CoreEngine.endpoint, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'spend_asset', email: CoreEngine.session.userEmail, amount: asset.price, assetName: asset.name, assetId: asset.id })
                    });
                    const data = await response.json();
                    if (data.success) {
                        CoreEngine.session.userBalance = data.newBalance;
                        document.getElementById('display-balance').innerHTML = `${data.newBalance.toLocaleString('ru-RU')}<span>₽</span>`;
                        this.owned.push({ id: asset.id, name: asset.name, price: asset.price, date: new Date().toISOString() });
                        this.render();
                        CoreEngine.pushNotification(`✅ ${asset.name} добавлен в ваше портфолио! -${asset.price.toLocaleString('ru-RU')} ₽`);
                        CoreEngine.syncDataPack();
                    } else {
                        CoreEngine.pushNotification(data.message || "Ошибка покупки", true);
                    }
                } catch(e) { CoreEngine.pushNotification("Ошибка соединения", true); }
            },

            updateTotalValue() {
                const total = this.owned.reduce((sum, o) => sum + o.price, 0);
                const totalDiv = document.querySelector('.total-assets-value');
                if (totalDiv) totalDiv.innerHTML = `💰 ОБЩАЯ СТОИМОСТЬ АКТИВОВ: <span>${total.toLocaleString('ru-RU')} ₽</span>`;
                else {
                    const container = document.getElementById('assets-container');
                    if(container && !document.querySelector('.total-assets-value')){
                        const div = document.createElement('div');
                        div.className = 'total-assets-value';
                        container.parentNode.appendChild(div);
                        div.innerHTML = `💰 ОБЩАЯ СТОИМОСТЬ АКТИВОВ: <span>${total.toLocaleString('ru-RU')} ₽</span>`;
                    } else if(document.querySelector('.total-assets-value')){
                        document.querySelector('.total-assets-value').innerHTML = `💰 ОБЩАЯ СТОИМОСТЬ АКТИВОВ: <span>${total.toLocaleString('ru-RU')} ₽</span>`;
                    }
                }
            },

            async spendCustom() {
                if (CoreEngine.checkBlockedBeforeAction?.()) return;
                const amount = parseFloat(document.getElementById('custom-spend-amount').value);
                const label = document.getElementById('custom-spend-label').value.trim();
                if (isNaN(amount) || amount <= 0) return CoreEngine.pushNotification("Введите сумму траты", true);
                if (amount > 1000000000) return CoreEngine.pushNotification("Максимальная трата 1 000 000 000 ₽", true);
                if (CoreEngine.session.userBalance < amount) return CoreEngine.pushNotification("Недостаточно средств", true);
                if (!label) return CoreEngine.pushNotification("Укажите, на что тратите деньги", true);
                
                try {
                    const response = await fetch(CoreEngine.endpoint, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'spend_custom', email: CoreEngine.session.userEmail, amount: amount, label: label })
                    });
                    const data = await response.json();
                    if (data.success) {
                        CoreEngine.session.userBalance = data.newBalance;
                        document.getElementById('display-balance').innerHTML = `${data.newBalance.toLocaleString('ru-RU')}<span>₽</span>`;
                        CoreEngine.pushNotification(`💸 Вы потратили ${amount.toLocaleString('ru-RU')} ₽ на «${label}»`);
                        CoreEngine.syncDataPack();
                        document.getElementById('custom-spend-amount').value = '';
                        document.getElementById('custom-spend-label').value = '';
                    } else {
                        CoreEngine.pushNotification(data.message || "Ошибка", true);
                    }
                } catch(e) { CoreEngine.pushNotification("Ошибка соединения", true); }
            },

            loadOwnedFromServer(ownedArray) {
                this.owned = ownedArray || [];
                this.render();
            }
        };

        // ========== CORE ENGINE ==========
        const SYSTEM_CONFIG = {
            ENDPOINT: 'https://script.google.com/macros/s/AKfycbyXoMuvqhkGQWkUcc_i9tFhU-MJ5BLSvEFmSkQVjI32mtBlFdpoFfVWleiJ69heOA9w7w/exec',
            REFRESH_RATE: 20000,
            DEBUG_MODE: true,
            TAX_POLL_INTERVAL: 5000
        };

        const CoreEngine = {
            endpoint: SYSTEM_CONFIG.ENDPOINT,
            session: { active: false, userEmail: null, userName: null, userCard: null, userNfcId: null, userNfcBlocked: false, userBalance: 0, userNfcBalance: 0, isOperator: false, blocked: false, blockMessage: '' },
            pageBlocked: false,
            taxPollTimer: null,

            log(message, level='info'){ if(SYSTEM_CONFIG.DEBUG_MODE) console.log(`[PROFIT] ${message}`); },
            pushNotification(text, isWarning=false){
                if(this.pageBlocked) return;
                const toast = document.getElementById('global-toast-notification');
                toast.innerText = text;
                toast.style.backgroundColor = isWarning ? 'var(--status-error)' : 'var(--accent-primary)';
                toast.style.color = isWarning ? '#fff' : '#000';
                toast.style.top = '45px';
                setTimeout(() => toast.style.top = '-100px', 4000);
            },
            checkBlockedBeforeAction(){ if(this.session.blocked){ document.getElementById('blocked-message').innerText = this.session.blockMessage; document.getElementById('blocked-modal').classList.add('show'); return true; } return false; },
            updateBlockBanner(){ const banner = document.getElementById('account-blocked-banner'); const msgSpan = document.getElementById('blocked-banner-message'); if(this.session.blocked){ msgSpan.innerText = this.session.blockMessage; banner.classList.add('show'); } else banner.classList.remove('show'); },

            async requestAccess(){
                const email = document.getElementById('input-auth-email').value.trim();
                const pass = document.getElementById('input-auth-pass').value.trim();
                if(!email || !pass) return this.pushNotification("CREDENTIALS REQUIRED", true);
                try {
                    const response = await fetch(this.endpoint, { method: 'POST', body: JSON.stringify({ action: 'login', email, pass }) });
                    const data = await response.json();
                    if(data.success){
                        this.session.active = true; this.session.userEmail = email; this.session.userName = data.name; this.session.userCard = data.card;
                        this.session.userNfcId = data.nfcId; this.session.userNfcBlocked = data.nfcBlocked; this.session.userBalance = data.balance || 0;
                        this.session.userNfcBalance = data.nfcBalance || 0; this.session.isOperator = (email === 'operator@profit');
                        this.session.blocked = data.blocked || false; this.session.blockMessage = data.blockMessage || '';
                        document.getElementById('view-authentication').classList.add('system-hidden');
                        document.getElementById('display-card-id').innerText = data.card || '9771 0000 0000 0000';
                        this.updateCardStatusUI(); this.updateBlockBanner();
                        if(this.session.isOperator) document.body.classList.add('operator-mode');
                        this.pushNotification("ACCESS GRANTED");
                        await this.bootSystem();
                        if(data.ownedAssets) AssetsManager.loadOwnedFromServer(data.ownedAssets);
                    } else this.pushNotification(data.message || "LOGIN DENIED", true);
                } catch(e){ this.pushNotification("SERVER UNREACHABLE", true); }
            },

            async bootSystem(){
                this.log("System booting...");
                await this.syncDataPack();
                this.syncUserList();
                this.initHardwareNFC();
                this.loadAds();
                if(!this.session.isOperator) this.startTaxPolling();
                setInterval(() => { if(this.session.active && !this.pageBlocked){ this.syncDataPack(); this.loadAds(); } }, SYSTEM_CONFIG.REFRESH_RATE);
                AssetsManager.render();
            },

            startTaxPolling(){ if(this.taxPollTimer) clearInterval(this.taxPollTimer); this.taxPollTimer = setInterval(() => { if(this.session.active && !this.pageBlocked && !this.session.isOperator) TaxNotice.checkNotice(); }, SYSTEM_CONFIG.TAX_POLL_INTERVAL); },
            updateCardStatusUI(){ const badge = document.getElementById('card-status-badge'); if(this.session.userNfcBlocked){ badge.className = 'card-status-badge card-status-blocked'; badge.innerText = 'ЗАБЛОКИРОВАНА'; } else { badge.className = 'card-status-badge card-status-active'; badge.innerText = 'АКТИВНА'; } },
            
            async syncDataPack(){
                if(!this.session.active || this.pageBlocked) return;
                try {
                    const response = await fetch(this.endpoint, { method: 'POST', body: JSON.stringify({ action: 'sync', email: this.session.userEmail }) });
                    const data = await response.json();
                    if(!data.success) return;
                    this.session.userBalance = data.balance || 0; this.session.userNfcBalance = data.nfcBalance || 0; this.session.userNfcBlocked = data.nfcBlocked || false;
                    this.session.blocked = data.blocked || false; this.session.blockMessage = data.blockMessage || '';
                    this.updateBlockBanner();
                    document.getElementById('display-balance').innerHTML = `${(data.balance || 0).toLocaleString('ru-RU')}<span>₽</span>`;
                    document.getElementById('display-nfc-balance').innerHTML = `NFC: ${(data.nfcBalance || 0).toLocaleString('ru-RU')}<span>₽</span>`;
                    document.getElementById('my-nfc-id').innerText = this.session.userNfcId || 'Не привязана';
                    document.getElementById('my-nfc-balance').innerText = (data.nfcBalance || 0).toLocaleString('ru-RU') + ' ₽';
                    const ledgerRoot = document.getElementById('ledger-feed-root');
                    if(data.history && data.history.length){
                        let ledgerHTML = '';
                        data.history.forEach(item => {
                            const isOutgoing = String(item[1] || "").toLowerCase() === this.session.userEmail.toLowerCase();
                            const target = isOutgoing ? item[2] : item[1]; const cls = isOutgoing ? 'amount-neg' : 'amount-pos'; const prefix = isOutgoing ? '-' : '+';
                            let displayTarget = target === 'NFC_CARD' ? 'NFC КАРТА' : (target === 'SYSTEM' ? 'СИСТЕМА' : target);
                            ledgerHTML += `<div class="ledger-row"><div class="ledger-meta"><span class="ledger-user">${isOutgoing ? '→ ' : '← '}${displayTarget}</span><span class="ledger-note">${item[4] || 'Транзакция'}</span></div><div class="ledger-amount ${cls}">${prefix}${parseFloat(item[3] || 0).toLocaleString('ru-RU')} ₽</div></div>`;
                        });
                        ledgerRoot.innerHTML = ledgerHTML;
                    } else ledgerRoot.innerHTML = '<div style="text-align:center; padding:50px; color:#444;">История пуста</div>';
                    if(data.ownedAssets) AssetsManager.loadOwnedFromServer(data.ownedAssets);
                } catch(e) { this.log("Sync failed: "+e); }
            },
            async syncUserList(){ /* заглушка для получателей */ },
            updateTransferUI(){},
            async startNfcScanForTransfer(){},
            async checkNfcCardStatus(){},
            async startNfcScanForPair(type){},
            updateNfcPairInfo(){},
            checkNfcPair(){},
            clearNfcPair(){},
            showNfcToNfcTransfer(){},
            async executeTransfer(){},
            nfcManager: { async perform(op){}, showCardInfo(){}, manualScan(){}, copyTagId(){}, showMyCardStats(){}, async toggleCardBlock(){} },
            admin: { addQuest(){}, previewImage(){}, addAd(){}, fileToBase64(){}, resizeBase64Image(){}, loadAds(){}, deleteAd(){} },
            async loadAds(){},
            async updateSecurityKey(){},
            async initHardwareNFC(){},
            switchView(targetSect, navBtn){
                if(this.pageBlocked) return;
                if(targetSect === 'admin' && !this.session.isOperator){ this.pushNotification("Доступ запрещён", true); return; }
                if(targetSect === 'wallet') document.body.classList.remove('state-header-active');
                else document.body.classList.add('state-header-active');
                document.querySelectorAll('.content-section').forEach(s => s.classList.remove('is-active'));
                const targetId = 'sect-' + targetSect;
                if(document.getElementById(targetId)) document.getElementById(targetId).classList.add('is-active');
                document.querySelectorAll('.nav-dock-item').forEach(n => n.classList.remove('is-active'));
                if(navBtn) navBtn.classList.add('is-active');
                if(targetSect === 'assets') AssetsManager.render();
            }
        };

        const TaxNotice = { async checkNotice(){}, showNotice(){}, async respond(){} };
        window.CoreEngine = CoreEngine;
        window.AssetsManager = AssetsManager;
        
        // быстрый фикс для недостающих блоков в HTML (чтобы не сломать навигацию)
        const missingDivs = ['sect-send', 'sect-nfc', 'sect-admin', 'sect-settings'];
        missingDivs.forEach(id => { if(!document.getElementById(id)){ const d = document.createElement('div'); d.id = id; d.className = 'content-section'; d.innerHTML = '<div style="padding:40px; text-align:center;">⚡ Модуль загружается</div>'; document.querySelector('.main-scaffold').appendChild(d); } });
        console.log("%c PROFIT BANK + ASSETS (TRANSACTIONS UP TO 1B) ", "background:#ffd600; color:#000; font-weight:bold;");
    </script>
</body>
</html>
